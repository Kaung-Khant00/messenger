<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
</head>
<style>
  .messageTag{
    width: fit-content;
    padding: 5px;
    border-radius: 5px;
    background-color: lightblue;
  }
  .container{
    display: flex;
    justify-content: space-between;
    padding: 2px;
  }
  .time{
    opacity: 0.7;
  }
  .message{
    margin: 10px;
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
  }
</style>
<body>
<div class="messageTag">
  <div class="container">
    <div class="user"><strong>user</strong></div>
    <div class="time">43</div>
  </div>
  <div class="message">hellgggggggggggggggggggggo</div>
</div>
</body>
</html>
